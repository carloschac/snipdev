services:
  postgres:
    image: postgres:16-alpine
    container_name: snipdev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: snipdev
      POSTGRES_PASSWORD: snipdev123
      POSTGRES_DB: snipdev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
